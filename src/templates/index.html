<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Top 10 Artists</title>
  </head>
  <body>
    <div class="page">
      <section class="hero">
        <h1>Top 10 Artists</h1>
        <p>Your favorite artists from Spotify data</p>
      </section>

      <div class="card">
        <ol class="artist-list">
          {% for artist in artists %}
            <li class="artist-item">{{ artist }}</li>
          {% endfor %}
        </ol>
      </div>
    </div>
  </body>
</html>
